name: Update proxy subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-proxy-subscription
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run strict proxy check
        run: bash scripts/run-subs-check.sh

      - name: Commit updated subscription files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update proxy subscriptions"
          file_pattern: "public/*.yaml public/*.txt public/index.html public/stats/*"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

